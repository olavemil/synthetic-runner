providers:
- id: lmstudio
  type: openai_compat
  base_url: ${LMSTUDIO_BASE_URL}
  api_key: lm-studio
  max_concurrency: 1
- id: anthropic
  type: anthropic
  api_key: ${ANTHROPIC_API_KEY}

adapters:
- id: matrix-main
  type: matrix
  homeserver: ${MATRIX_HOMESERVER}

storage_dir: instances
store_path: harness.db
poll_interval: 30

scheduler:
  check_interval: 300    # seconds between check runs (poll + enqueue)
  work_interval: 60      # seconds between work runs (drain queue)
  log_file: logs/symbiosis.log

sync:
  repo: ../synthetic-space
  prefix: symbiosis

analytics:
  base_url: http://localhost:8000
  api_key: ${ANALYTICS_API_KEY}
