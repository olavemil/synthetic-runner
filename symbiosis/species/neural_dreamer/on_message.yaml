steps:
  # Phase 1: Gut feeling — immediate unfiltered reaction
  - stage: llm_generate
    inputs:
      system: pipeline.gut_system
      content: pipeline.gut_context
    outputs:
      result: pipeline.gut_feeling

  # Phase 2: Suggestion — structured response candidates
  - stage: llm_generate
    inputs:
      system: pipeline.suggest_system
      content: pipeline.suggest_context
      context: pipeline.gut_feeling
    outputs:
      result: pipeline.suggestions

  # Phase 3: Reply — final message
  - stage: llm_generate
    inputs:
      system: pipeline.reply_system
      content: pipeline.reply_context
      context: pipeline.suggestions
    outputs:
      result: pipeline.response

  # Phase 4: Review — self-evaluation
  - stage: llm_generate
    inputs:
      system: file:prompts/review.md
      content: pipeline.review_context
    outputs:
      result: pipeline.last_review
