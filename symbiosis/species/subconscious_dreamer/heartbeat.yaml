steps:
  # Phase 1: Active thinking session — tool-use loop, writes thinking.md directly
  - stage: thinking_session
    inputs:
      system: file:prompts/active_thinking.md
      initial_message: pipeline.thinking_context
    preprocessors:
      initial_message:
        type: truncate
        max_chars: 6000

  # Phase 2: Subconscious evaluation — reads fresh thinking + dreams → concerns.md
  - stage: format_context
    inputs:
      sections: pipeline.subconscious_sections
    outputs:
      result: pipeline.subconscious_context

  - stage: llm_generate
    inputs:
      system: file:prompts/subconscious.md
      content: pipeline.subconscious_context
    preprocessors:
      content:
        type: truncate
        max_chars: 6000
    outputs:
      result: memory.concerns

  # Phase 3: Dreaming — reads fresh thinking + concerns → dreams.md
  - stage: format_context
    inputs:
      sections: pipeline.dreaming_sections
    outputs:
      result: pipeline.dreaming_context

  - stage: llm_generate
    inputs:
      system: file:prompts/dreaming.md
      content: pipeline.dreaming_context
    preprocessors:
      content:
        type: truncate
        max_chars: 6000
    outputs:
      result: memory.dreams
